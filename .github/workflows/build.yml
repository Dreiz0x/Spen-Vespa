name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: '35'
  ANDROID_BUILD_TOOLS: '35.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 1. ELIMINAMOS el caché manual obsoleto.
      # 2. USAMOS la acción oficial de Gradle: es más brillante y maneja el caché de forma nativa.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 3. AQUÍ ESTÁ TU MAGIA: Forzamos la creación del Wrapper 8.7 usando el motor base del runner.
      - name: Force Gradle Wrapper 8.7
        run: gradle wrapper --gradle-version 8.7

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. ELIMINAMOS setup-android@v3 porque 'ubuntu-latest' ya trae el SDK preinstalado. Cero fricción.
      
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vespa-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            app/build/outputs/lint-results-debug.html
            app/build/reports/
          retention-days: 7
